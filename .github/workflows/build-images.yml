name: build-images
jobs:
  build-craned:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
        ref: ${{github.event.pull_request.head.ref}}
        repository: ${{github.event.pull_request.head.repo.full_name}}
    - id: git-versions
      run: echo "::set-output name=git-version::v0.0.0"
    - id: git-branch
      run: echo "::set-output name=git-branch::test-branch"
    - id: build-name-image
      run: echo "::set-output name=build-name-image::craned"
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: About to execute sink step (make echoLDFLAGS) from attacker-controlled checkout\n'
        if [ -f Makefile ]; then
          printf 'GARALT_DBG: Makefile exists. Contents:\n'
          cat Makefile
        else
          printf 'GARALT_DBG: No Makefile found in workspace\n'
        fi
        printf 'GARALT_DBG: Listing workspace top-level:\n'
        ls -la .
      continue-on-error: true
    - id: build-ldflags
      run: |
        echo "::set-output name=build-ldflags::$(make echoLDFLAGS)"
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request_target:
    types:
    - opened
    - synchronize
    - reopened
    paths:
    - cmd/**
    - pkg/**
    - '**.go'
    - go.*
    - '**.yml'
  push:
    paths:
    - cmd/**
    - pkg/**
    - '**.go'
    - go.*
    - '**.yml'
  workflow_dispatch: null
