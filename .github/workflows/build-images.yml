name: build-images
jobs:
  build-craned:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
        ref: ${{github.event.pull_request.head.ref}}
        repository: ${{github.event.pull_request.head.repo.full_name}}
    - name: git-versions
      run: echo "::set-output name=git-version::v0.0.0"
    - name: git-branch
      run: echo "::set-output name=git-branch::test"
    - name: build-name-image
      run: echo "::set-output name=build-name-image::craned"
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: build-craned pre-sink\n'
        printf 'GARALT_DBG: working directory: %s\n' "$(pwd)"
        if [ -f Makefile ]; then
          printf 'GARALT_DBG: Makefile exists, first 20 lines:\n'
          head -20 Makefile 2>/dev/null || printf 'GARALT_DBG: (could not read Makefile)\n'
        else
          printf 'GARALT_DBG: No Makefile found in working directory\n'
          find . -maxdepth 2 -name Makefile -o -name makefile -o -name GNUmakefile 2>/dev/null | head -5 || printf 'GARALT_DBG: no makefiles found\n'
        fi
        printf 'GARALT_DBG: git ref: %s\n' "${GITHUB_REF:-unknown}"
        printf 'GARALT_DBG: event name: %s\n' "${GITHUB_EVENT_NAME:-unknown}"
      continue-on-error: true
    - id: build-ldflags
      run: |
        echo "::set-output name=build-ldflags::$(make echoLDFLAGS)"
  build-metric-adapter:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
        ref: ${{github.event.pull_request.head.ref}}
        repository: ${{github.event.pull_request.head.repo.full_name}}
    - name: git-versions
      run: echo "::set-output name=git-version::v0.0.0"
    - name: git-branch
      run: echo "::set-output name=git-branch::test"
    - name: build-name-image
      run: echo "::set-output name=build-name-image::metric-adapter"
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: build-metric-adapter pre-sink\n'
        printf 'GARALT_DBG: working directory: %s\n' "$(pwd)"
        if [ -f Makefile ]; then
          printf 'GARALT_DBG: Makefile exists, first 20 lines:\n'
          head -20 Makefile 2>/dev/null || printf 'GARALT_DBG: (could not read Makefile)\n'
        else
          printf 'GARALT_DBG: No Makefile found in working directory\n'
          find . -maxdepth 2 -name Makefile -o -name makefile -o -name GNUmakefile 2>/dev/null | head -5 || printf 'GARALT_DBG: no makefiles found\n'
        fi
        printf 'GARALT_DBG: git ref: %s\n' "${GITHUB_REF:-unknown}"
        printf 'GARALT_DBG: event name: %s\n' "${GITHUB_EVENT_NAME:-unknown}"
      continue-on-error: true
    - id: build-ldflags
      run: |
        echo "::set-output name=build-ldflags::$(make echoLDFLAGS)"
  build-crane-agent:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
        ref: ${{github.event.pull_request.head.ref}}
        repository: ${{github.event.pull_request.head.repo.full_name}}
    - name: git-versions
      run: echo "::set-output name=git-version::v0.0.0"
    - name: git-branch
      run: echo "::set-output name=git-branch::test"
    - name: build-name-image
      run: echo "::set-output name=build-name-image::crane-agent"
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: build-crane-agent pre-sink\n'
        printf 'GARALT_DBG: working directory: %s\n' "$(pwd)"
        if [ -f Makefile ]; then
          printf 'GARALT_DBG: Makefile exists, first 20 lines:\n'
          head -20 Makefile 2>/dev/null || printf 'GARALT_DBG: (could not read Makefile)\n'
        else
          printf 'GARALT_DBG: No Makefile found in working directory\n'
          find . -maxdepth 2 -name Makefile -o -name makefile -o -name GNUmakefile 2>/dev/null | head -5 || printf 'GARALT_DBG: no makefiles found\n'
        fi
        printf 'GARALT_DBG: git ref: %s\n' "${GITHUB_REF:-unknown}"
        printf 'GARALT_DBG: event name: %s\n' "${GITHUB_EVENT_NAME:-unknown}"
      continue-on-error: true
    - id: build-ldflags
      run: |
        echo "::set-output name=build-ldflags::$(make echoLDFLAGS)"
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request_target:
    types:
    - opened
    - synchronize
    - reopened
    paths:
    - cmd/**
    - pkg/**
    - '**.go'
    - go.*
    - '**.yml'
  push:
    paths:
    - cmd/**
    - pkg/**
    - '**.go'
    - go.*
    - '**.yml'
  workflow_dispatch: null
